<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Mapas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- mi css style.css-->
</head>
<body>
    <h2>Iframe de Google mapss</h2>
    <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d29282.435773907045!2d-5.7049088!3d43.5421184!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1ses!2ses!4v1775469368702!5m2!1ses!2ses" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    <h2>Haz click aquí para ver el mapa</h2>
    <a href="https://www.google.com/maps/@43.5363979,-5.7059851,258m/data=!3m1!1e3?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D" target="_blank">Ver mapa</a>


    <div id="lista"></div>

<script>

let locales = [
    {
        nombre: "Punto Caramelo",
        direccion: "Calle Caridad, 9, Centro, 33202 Gijón, Asturias",
        telefono: "984296618"
    },
       {
        nombre: "Le Menhir",
        direccion: "Marqués de Urquijo, 27, local 1, Gijon-Este, 33203 Gijón, Asturias",
        telefono: "606679069"
    },
       {
        nombre: "Centro Comercial Los Fresnos",
        direccion: "Calle Río de Oro, 3, Centro, 33209 Gijón, Asturias",
        telefono: "985142044"
    },
        {
        nombre: "Librería la Revoltosa",
        direccion: " C. Juan Alonso, 12, Centro, 33201 Gijón, Asturias",
        telefono: "985099725"
    }
];

let misLocales='<ul>';

for(let i=0; i<locales.length;i++){
misLocales+=`<li>
    <h3>${locales[i]['nombre']}</h3>
    
    <p>
        <i class="fa-solid fa-phone"></i>
        <a href="tel:${locales[i]['telefono']}">${locales[i]['telefono']}</a>
    </p>
   
    <p>
        <i class="fa-brands fa-whatsapp"></i>
        <a href="https://wa.me/34:${locales[i]['telefono']}">Enviar Whatsapp</a>
    </p>
    
    <p>
        <i class="fa-solid fa-map-location-dot"></i>
        <a href="https://google.com/maps/search/${locales[i]['nombre']} ${locales[i]['direccion']}" target="_blank">${locales[i]['direccion']}</a>
    </p>

    </li>`;
}

document.querySelector('#lista').innerHTML=misLocales;

// https://google.com/maps/search/Ocine%20Gij%C3%B3n,%20Sala%203%20-%20C.C.Los%20Fresnos,%20C.%20R%C3%ADo%20de%20Oro%203,%2033209%20Gij%C3%B3n
    </script>





</body>
</html>
