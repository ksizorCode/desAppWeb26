<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pie Chart Europa</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Salario mínimo en Europa (comparación)</h2>
<canvas id="pieChart"></canvas>

<script>
// Datos
const data = {
  labels: [
    "Bulgaria", "Hungría", "Rumanía", "Portugal", "España",
    "Francia", "Alemania", "Países Bajos", "Irlanda", "Luxemburgo"
  ],
  datasets: [{
    label: "Salario mínimo (€)",
    data: [
      551, 707, 814, 1015, 1381,
      1802, 2161, 2193, 2282, 2638
    ],
    backgroundColor: [
      "#FF6384", "#36A2EB", "#FFCE56", "#4BC0C0", "#9966FF",
      "#FF9F40", "#8DD17E", "#C9CBCF", "#FF6B6B", "#6A4C93"
    ]
  }]
};

// Configuración
const config = {
  type: 'pie',
  data: data,
  options: {
    responsive: true,
    plugins: {
      legend: {
        position: 'right'
      },
      tooltip: {
        callbacks: {
          label: function(context) {
            return context.label + ": €" + context.raw;
          }
        }
      }
    }
  }
};

// Crear gráfico
new Chart(
  document.getElementById('pieChart'),
  config
);
</script>

</body>
</html>
