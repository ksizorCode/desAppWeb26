<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noticias Deportivas — Marca RSS</title>
    <meta name="description"
        content="Las últimas noticias deportivas de Marca en tiempo real. Lector RSS moderno y elegante." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        /* ── Reset & Base ─────────────────────────────────── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, .72);
            --bg-glass: rgba(255, 255, 255, .04);
            --border-glass: rgba(255, 255, 255, .08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #f43f5e;
            --accent-glow: rgba(244, 63, 94, .35);
            --accent-alt: #8b5cf6;
            --gradient-hero: linear-gradient(135deg, #f43f5e 0%, #8b5cf6 50%, #06b6d4 100%);
            --radius: 16px;
            --radius-sm: 10px;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, .4);
            --transition: .3s cubic-bezier(.4, 0, .2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ── Animated BG Blobs ────────────────────────────── */
        .bg-blobs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-blobs span {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: .18;
        }

        .bg-blobs .blob-1 {
            width: 600px;
            height: 600px;
            background: #f43f5e;
            top: -10%;
            left: -8%;
            animation: float-blob 18s ease-in-out infinite alternate;
        }

        .bg-blobs .blob-2 {
            width: 500px;
            height: 500px;
            background: #8b5cf6;
            bottom: -12%;
            right: -6%;
            animation: float-blob 22s ease-in-out infinite alternate-reverse;
        }

        .bg-blobs .blob-3 {
            width: 400px;
            height: 400px;
            background: #06b6d4;
            top: 40%;
            left: 50%;
            animation: float-blob 20s ease-in-out infinite alternate;
        }

        @keyframes float-blob {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(60px, -40px) scale(1.15);
            }
        }

        /* ── Header ───────────────────────────────────────── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11, 15, 25, .78);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid var(--border-glass);
            padding: 0 24px;
        }

        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 68px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.35rem;
            background: var(--gradient-hero);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo svg {
            flex-shrink: 0;
        }

        #btn-refresh {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-glass);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
            border-radius: 999px;
            padding: 10px 22px;
            font-size: .875rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        #btn-refresh:hover {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        #btn-refresh.spinning svg {
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Hero ──────────────────────────────────────────── */
        .hero {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 64px 24px 40px;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 900;
            background: var(--gradient-hero);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -.03em;
            line-height: 1.15;
        }

        .hero p {
            margin-top: 14px;
            color: var(--text-secondary);
            font-size: 1.05rem;
            max-width: 560px;
            margin-inline: auto;
        }

        .hero .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: .78rem;
            font-weight: 600;
            background: rgba(244, 63, 94, .12);
            color: var(--accent);
            border: 1px solid rgba(244, 63, 94, .2);
        }

        .hero .badge .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 1.6s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: .4;
                transform: scale(.7);
            }
        }

        /* ── Status / Loader ──────────────────────────────── */
        #status {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px 24px;
            color: var(--text-secondary);
            font-size: .95rem;
        }

        .loader {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 60px 0;
        }

        .loader span {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce-loader .6s ease-in-out infinite alternate;
        }

        .loader span:nth-child(2) {
            animation-delay: .15s;
        }

        .loader span:nth-child(3) {
            animation-delay: .3s;
        }

        @keyframes bounce-loader {
            to {
                transform: translateY(-18px);
                opacity: .3;
            }
        }

        .error-msg {
            max-width: 600px;
            margin: 30px auto;
            padding: 20px 28px;
            border-radius: var(--radius);
            background: rgba(244, 63, 94, .08);
            border: 1px solid rgba(244, 63, 94, .25);
            color: #fca5a5;
            text-align: center;
            font-size: .92rem;
        }

        /* ── News Grid ─────────────────────────────────────── */
        .news-grid {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px 80px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        /* ── Card ──────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            animation: card-in .55s ease both;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, .5), 0 0 0 1px rgba(244, 63, 94, .15);
            border-color: rgba(244, 63, 94, .22);
        }

        @keyframes card-in {
            from {
                opacity: 0;
                transform: translateY(30px) scale(.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .card-img-wrap {
            position: relative;
            overflow: hidden;
            aspect-ratio: 16/9;
            background: var(--bg-secondary);
        }

        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .5s ease;
        }

        .card:hover .card-img-wrap img {
            transform: scale(1.06);
        }

        .card-img-wrap .category {
            position: absolute;
            top: 14px;
            left: 14px;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            background: var(--accent);
            color: #fff;
        }

        .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 22px 24px 24px;
        }

        .card-body h2 {
            font-size: 1.08rem;
            font-weight: 700;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-body h2 a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color var(--transition);
        }

        .card-body h2 a:hover {
            color: var(--accent);
        }

        .card-body .description {
            margin-top: 10px;
            font-size: .88rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid var(--border-glass);
            font-size: .78rem;
            color: var(--text-muted);
        }

        .card-meta .author {
            font-weight: 600;
            color: var(--accent-alt);
        }

        .card-meta .read-more {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            transition: gap var(--transition);
        }

        .card-meta .read-more:hover {
            gap: 8px;
        }

        /* ── No image fallback ─────────────────────────────── */
        .card-img-wrap .no-img {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-secondary), #1e293b);
            color: var(--text-muted);
            font-size: 2.5rem;
        }

        /* ── Footer ────────────────────────────────────────── */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 30px 24px 40px;
            color: var(--text-muted);
            font-size: .82rem;
            border-top: 1px solid var(--border-glass);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* ── Responsive ────────────────────────────────────── */
        @media (max-width: 480px) {
            .news-grid {
                grid-template-columns: 1fr;
            }

            .header-inner {
                height: 56px;
            }

            .hero {
                padding: 40px 16px 24px;
            }
        }
    </style>
</head>

<body>

    <!-- Animated Background -->
    <div class="bg-blobs">
        <span class="blob-1"></span>
        <span class="blob-2"></span>
        <span class="blob-3"></span>
    </div>

    <!-- Header -->
    <header>
        <div class="header-inner">
            <div class="logo">
                <svg width="28" height="28" fill="none" viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5z" fill="#f43f5e" />
                    <path d="M2 17l10 5 10-5" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M2 12l10 5 10-5" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                Noticias Deportivas
            </div>
            <button id="btn-refresh" title="Recargar noticias">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" viewBox="0 0 24 24">
                    <path d="M23 4v6h-6" />
                    <path d="M1 20v-6h6" />
                    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
                </svg>
                Actualizar
            </button>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <h1>Últimas Noticias de Marca</h1>
        <p>Feed RSS en tiempo real con las noticias deportivas más recientes de Marca.com</p>
        <div class="badge"><span class="dot"></span> En vivo — RSS Feed</div>
    </section>

    <!-- Status -->
    <div id="status"></div>

    <!-- News Grid -->
    <div class="news-grid" id="news-grid"></div>

    <!-- Footer -->
    <footer>
        Fuente: <a href="https://www.marca.com" target="_blank" rel="noopener">Marca.com</a> &middot; RSS Feed &middot;
        Actualizado <span id="last-update">—</span>
    </footer>

    <script>
        (() => {
            'use strict';

            const RSS_URL = 'https://www.marca.com/rss/googlenews/portada.xml';
            // List of CORS proxies to try in order (some may be down)
            const CORS_PROXIES = [
                url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
                url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
            ];

            const grid = document.getElementById('news-grid');
            const statusEl = document.getElementById('status');
            const btnRefresh = document.getElementById('btn-refresh');
            const lastUpdate = document.getElementById('last-update');

            /* ── Helpers ───────────────────────────── */
            function showLoader() {
                statusEl.innerHTML = `
      <div class="loader">
        <span></span><span></span><span></span>
      </div>
      <p>Cargando noticias desde Marca…</p>`;
                grid.innerHTML = '';
            }

            function showError(msg) {
                statusEl.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
            }

            function timeAgo(dateStr) {
                try {
                    const date = new Date(dateStr);
                    if (isNaN(date)) return dateStr;
                    const diff = (Date.now() - date) / 1000;
                    if (diff < 60) return 'Hace un momento';
                    if (diff < 3600) return `Hace ${Math.floor(diff / 60)} min`;
                    if (diff < 86400) return `Hace ${Math.floor(diff / 3600)}h`;
                    return date.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
                } catch { return dateStr; }
            }

            function extractImage(item) {
                // Try media:content
                const mediaContent = item.getElementsByTagName('media:content')[0];
                if (mediaContent) {
                    const url = mediaContent.getAttribute('url');
                    if (url) return url;
                }
                // Try media:thumbnail
                const mediaThumbnail = item.getElementsByTagName('media:thumbnail')[0];
                if (mediaThumbnail) {
                    const url = mediaThumbnail.getAttribute('url');
                    if (url) return url;
                }
                // Try enclosure
                const enclosure = item.getElementsByTagName('enclosure')[0];
                if (enclosure) {
                    const url = enclosure.getAttribute('url');
                    if (url) return url;
                }
                // Try to find image in description HTML
                const desc = item.getElementsByTagName('description')[0];
                if (desc) {
                    const html = desc.textContent || '';
                    const match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
                    if (match) return match[1];
                }
                // Try content:encoded
                const content = item.getElementsByTagName('content:encoded')[0];
                if (content) {
                    const html = content.textContent || '';
                    const match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
                    if (match) return match[1];
                }
                return null;
            }

            function getText(item, tag) {
                const el = item.getElementsByTagName(tag)[0];
                return el ? (el.textContent || '').trim() : '';
            }

            function stripHTML(str) {
                const tmp = document.createElement('div');
                tmp.innerHTML = str;
                return tmp.textContent || tmp.innerText || '';
            }

            /* ── Fetch with proxy fallback ─────────── */
            async function fetchWithProxy(url) {
                for (let i = 0; i < CORS_PROXIES.length; i++) {
                    const proxyUrl = CORS_PROXIES[i](url);
                    try {
                        const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(12000) });
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        const text = await res.text();
                        if (!text || text.length < 100) throw new Error('Empty response');
                        return text;
                    } catch (e) {
                        console.warn(`Proxy ${i + 1} failed:`, e.message);
                        if (i === CORS_PROXIES.length - 1) throw e;
                    }
                }
            }

            /* ── Parse & Render ────────────────────── */
            function parseAndRender(xmlText) {
                const parser = new DOMParser();
                const xml = parser.parseFromString(xmlText, 'application/xml');

                // Check parse error
                const parseErr = xml.querySelector('parsererror');
                if (parseErr) {
                    showError('Error al parsear el XML. El feed puede estar temporalmente no disponible.');
                    return;
                }

                const items = xml.querySelectorAll('item');
                if (!items.length) {
                    showError('No se encontraron noticias en el feed.');
                    return;
                }

                statusEl.innerHTML = '';
                grid.innerHTML = '';

                items.forEach((item, idx) => {
                    const title = getText(item, 'title');
                    const link = getText(item, 'link');
                    const desc = stripHTML(getText(item, 'description'));
                    const pubDate = getText(item, 'pubDate');
                    const category = getText(item, 'category') || 'Deportes';
                    const author = getText(item, 'dc:creator') || getText(item, 'author') || 'Marca';
                    const imgUrl = extractImage(item);

                    const card = document.createElement('article');
                    card.className = 'card';
                    card.style.animationDelay = `${idx * .07}s`;
                    card.id = `news-card-${idx}`;

                    card.innerHTML = `
        <div class="card-img-wrap">
          ${imgUrl
                            ? `<img src="${imgUrl}" alt="${title}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'no-img\\'>📰</div>'">`
                            : '<div class="no-img">📰</div>'
                        }
          <span class="category">${category}</span>
        </div>
        <div class="card-body">
          <h2><a href="${link}" target="_blank" rel="noopener">${title}</a></h2>
          ${desc ? `<p class="description">${desc}</p>` : ''}
          <div class="card-meta">
            <span><span class="author">${author}</span> · ${timeAgo(pubDate)}</span>
            <a href="${link}" target="_blank" rel="noopener" class="read-more">
              Leer
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
          </div>
        </div>`;

                    grid.appendChild(card);
                });

                lastUpdate.textContent = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            }

            /* ── Main Load ─────────────────────────── */
            async function loadFeed() {
                showLoader();
                btnRefresh.classList.add('spinning');
                try {
                    const xmlText = await fetchWithProxy(RSS_URL);
                    parseAndRender(xmlText);
                } catch (err) {
                    console.error('Feed load failed:', err);
                    showError(`No se pudieron cargar las noticias. Intenta de nuevo más tarde.<br><small>${err.message}</small>`);
                } finally {
                    btnRefresh.classList.remove('spinning');
                }
            }

            btnRefresh.addEventListener('click', loadFeed);

            // Initial load
            loadFeed();
        })();
    </script>
</body>

</html>
